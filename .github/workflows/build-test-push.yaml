name: sprobot build, test, and maybe push

on:
  push:
    branches-ignore: # Dependabot branches get ran through pull_request
      - 'dependabot/**'
  pull_request:
  schedule:
    - cron: '0 5 * * 1,3,5'

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
      fail-fast: true
    runs-on: ${{ matrix.runner }}
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build test image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: false
          load: true
          tags: sprobot-test
          target: test
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Run vet and tests
        run: docker run --platform ${{ matrix.platform }} sprobot-test

  publish-build:
    needs: [test]
    if: startsWith(github.ref, 'refs/heads/main')
    strategy:
      matrix:
        include:
          - image: sadbox/sprobot
            target: prod
            platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: publish-bot-amd64
          - image: sadbox/sprobot
            target: prod
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: publish-bot-arm64
          - image: sadbox/sprobot-web
            target: prodweb
            platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: publish-web-amd64
          - image: sadbox/sprobot-web
            target: prodweb
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: publish-web-arm64
          - image: sadbox/stickybot
            target: prodstickybot
            platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: publish-stickybot-amd64
          - image: sadbox/stickybot
            target: prodstickybot
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: publish-stickybot-arm64
          - image: sadbox/threadbot
            target: prodthreadbot
            platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: publish-threadbot-amd64
          - image: sadbox/threadbot
            target: prodthreadbot
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: publish-threadbot-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=${{ matrix.platform }}
            type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/digest.txt

      - name: Compute artifact name
        run: |
          image="${{ matrix.image }}"
          platform="${{ matrix.platform }}"
          echo "ARTIFACT_NAME=digest-${image//\//-}-${platform//\//-}" >> "$GITHUB_ENV"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: /tmp/digests/digest.txt
          retention-days: 1

  publish-merge:
    needs: [publish-build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: sadbox/sprobot
            artifact-prefix: digest-sadbox-sprobot
          - image: sadbox/sprobot-web
            artifact-prefix: digest-sadbox-sprobot-web
          - image: sadbox/stickybot
            artifact-prefix: digest-sadbox-stickybot
          - image: sadbox/threadbot
            artifact-prefix: digest-sadbox-threadbot
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download amd64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact-prefix }}-linux-amd64
          path: /tmp/digests/amd64

      - name: Download arm64 digest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact-prefix }}-linux-arm64
          path: /tmp/digests/arm64

      - name: Create manifest and push
        run: |
          AMD64_DIGEST=$(cat /tmp/digests/amd64/digest.txt)
          ARM64_DIGEST=$(cat /tmp/digests/arm64/digest.txt)
          docker buildx imagetools create \
            -t ${{ matrix.image }}:latest \
            ${{ matrix.image }}@${AMD64_DIGEST} \
            ${{ matrix.image }}@${ARM64_DIGEST}
